AWSTemplateFormatVersion: '2010-09-09'
Description: MergeGuard - Base infrastructure (ECR, DynamoDB, IAM, Secrets)

Resources:

  # ── ECR ─────────────────────────────────────────────────────────────────────
  ECRRepository:
    Type: AWS::ECR::Repository
    Properties:
      RepositoryName: mergeguard
      ImageScanningConfiguration:
        ScanOnPush: true
      LifecyclePolicy:
        LifecyclePolicyText: |
          {"rules":[{"rulePriority":1,"description":"Keep last 5 images",
          "selection":{"tagStatus":"any","countType":"imageCountMoreThan","countNumber":5},
          "action":{"type":"expire"}}]}

  # ── DynamoDB ─────────────────────────────────────────────────────────────────
  ReviewsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: mergeguard-reviews
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: review_id
          AttributeType: S
      KeySchema:
        - AttributeName: review_id
          KeyType: HASH

  FindingsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: mergeguard-findings
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: review_id
          AttributeType: S
        - AttributeName: finding_idx
          AttributeType: N
      KeySchema:
        - AttributeName: review_id
          KeyType: HASH
        - AttributeName: finding_idx
          KeyType: RANGE

  # ── IAM Role for Lambda ──────────────────────────────────────────────────────
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: mergeguard-lambda-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: mergeguard-lambda-policy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - bedrock:InvokeModel
                  - bedrock:InvokeModelWithResponseStream
                Resource: '*'
              - Effect: Allow
                Action:
                  - dynamodb:PutItem
                  - dynamodb:GetItem
                  - dynamodb:UpdateItem
                  - dynamodb:Query
                  - dynamodb:Scan
                  - dynamodb:BatchWriteItem
                Resource:
                  - !GetAtt ReviewsTable.Arn
                  - !GetAtt FindingsTable.Arn
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                Resource:
                  - !Sub 'arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:mergeguard/*'
              - Effect: Allow
                Action:
                  - ecr:GetDownloadUrlForLayer
                  - ecr:BatchGetImage
                  - ecr:GetAuthorizationToken
                Resource: '*'

Outputs:
  ECRRepositoryUri:
    Value: !Sub '${AWS::AccountId}.dkr.ecr.${AWS::Region}.amazonaws.com/mergeguard'
    Export:
      Name: mergeguard-ecr-uri
  LambdaRoleArn:
    Value: !GetAtt LambdaExecutionRole.Arn
    Export:
      Name: mergeguard-lambda-role-arn
  ReviewsTableArn:
    Value: !GetAtt ReviewsTable.Arn
    Export:
      Name: mergeguard-reviews-table-arn
  FindingsTableArn:
    Value: !GetAtt FindingsTable.Arn
    Export:
      Name: mergeguard-findings-table-arn
